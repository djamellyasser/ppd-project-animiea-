name: anemia_lens
description: Non-invasive anemia screening using smartphone images and AI.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI & Navigation
  go_router: ^13.0.0

  # Image & Camera
  camera: ^0.10.5+9
  image_picker: ^1.0.7
  image: ^4.1.7

  # HTTP & API
  dio: ^5.4.3+1
  http: ^1.2.1

  # Local Storage (for history)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2

  app_links: 3.4.4

  # State Management (simple, no overhead for MVP)
  provider: ^6.1.2

  # Utils
  intl: ^0.19.0
  uuid: ^4.3.3

  firebase_core: ^2.27.0
  firebase_auth: ^4.17.0
  cloud_firestore: ^4.15.0


  supabase_flutter: ^2.0.0

  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true

  # ── FONTS ──
  # Download from Google Fonts and place in assets/fonts/
  fonts:
    - family: DMSerifDisplay
      fonts:
        - asset: assets/fonts/DMSerifDisplay-Regular.ttf
        - asset: assets/fonts/DMSerifDisplay-Italic.ttf
          style: italic
    - family: DMSans
      fonts:
        - asset: assets/fonts/DMSans-Italic-VariableFont_opsz,wght.ttf
          weight: 300
        - asset: assets/fonts/DMSans-VariableFont_opsz,wght.ttf
          weight: 400
        

  # ── ASSETS ──
  assets:
    - assets/fonts/
    - assets/images/
